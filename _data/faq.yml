questions:
  - q: "I am a prospective doctoral student. Can I join your research?"
    a: doctoral
  - q: "I am a University of Arizona masters student. Can I join your research?"
    a: semeval
  - q: "I am a University of Arizona undergraduate student. Can I join your research?"
    a: semeval
  - q: "I am a Tucson area high school student. Can I join your research?"
    a: semeval
  - q: "I do not fit any of the categories above. Can I join your research?"
    a: other
  - q: "Are you hiring postdocs?"
    a: postdoc
  - q: "Are you hiring research assistants?"
    a: ra
  - q: "Are you hiring teaching assistants?"
    a: ta
answers:
  doctoral: >
    I will not be considering applications for Ph.D. students before December 2026 (i.e., for
    students wanting to start the program in Fall 2027). If you are a prospective PhD student hoping
    to work with me, instead of emailing me, directly
    [apply to the INFO PhD program](https://grad.arizona.edu/admissions-guides/#program/INFOPHD).
    A compelling application will include:
      * a candidate statement that explains why we would be a good fit for each other, for example,
        because you have prior research related to my [recent publications](publications.html) or
        [ongoing projects](projects.html)
      * a curriculum vitae that demonstrates your research potential through publications in natural
        language processing workshops, conferences, or journals such as those on the
        [ACL Anthology](https://aclanthology.org/).
  semeval: >
    I will be taking on one-semester directed research students in Fall 2026 to work on
    [SemEval 2027](https://semeval.github.io/) shared tasks.
    If you are interested in such a directed research, wait until the SemEval 2027 tasks are
    announced (probably in August 2026), then send me an email with which task you would like to
    participate in, and a list of your prior experience and/or coursework in natural language
    processing and machine learning.
    I will select a small number of directed research students from the best such applications.
  other: >
    I am not currently taking on students who are not at the University of Arizona or a Tucson area
    school.
  postdoc: >
    I do not currently have funding for postdoctoral researchers.
  ta: >
    Please do not email me asking for paid teaching assistant or grader positions.
    Teaching assistant and grader positions are assigned by the department; I have no role in that
    process.
  ra: >
    Please do not email me asking for paid research assistant positions.
    When I have funding for student research, I allocate it to students who are already working in
    my lab, typically my doctoral students.


  
